services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev-www-image
    image: dev-www-image
    container_name: dev_www
    ports:
      - "8090:80"
    environment:
      DATABASE_URL: "postgresql://main:main@db:5432/main?serverVersion=17&charset=utf8"
    volumes:
      - /Users/fajnalowiec/php_dev_env/www:/var/www/html
      - ~/.ssh:/root/.ssh:ro
    depends_on:
      - db

  db:
    image: postgres:17-alpine
    container_name: dev_db
    environment:
      POSTGRES_DB: main
      POSTGRES_USER: main
      POSTGRES_PASSWORD: main
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  adminer:
    image: adminer
    container_name: dev_adminer
    ports:
      - "8091:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      - db

volumes:
  db_data:
